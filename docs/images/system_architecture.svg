<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img">
  <title>System Architecture — Tunnel Ventilation Control</title>
  <desc>Closed-loop control system: Sensor Network feeds Raspberry Pi, which commands VFD/Relay Interface, which drives Hybrid Filtration and Ventilation. Air quality feedback loops back to sensors.</desc>

  <!-- Background -->
  <rect width="680" height="620" fill="#ffffff"/>

  <!-- Outer container -->
  <rect x="30" y="20" width="620" height="560" rx="20" fill="#f8f8f6" stroke="#888780" stroke-width="1"/>
  <text x="340" y="50" text-anchor="middle" font-size="15" font-weight="600" fill="#2C2C2A">Closed-loop ventilation control system</text>
  <text x="340" y="68" text-anchor="middle" font-size="12" fill="#5F5E5A">Underground road tunnel — Obor underpass, Bucharest</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- NODE 1: Sensor Network (teal) -->
  <rect x="215" y="95" width="250" height="70" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="340" y="124" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Sensor network</text>
  <text x="340" y="145" text-anchor="middle" font-size="12" fill="#0F6E56">PM2.5 / PM10 · NO₂ · CO · IP65</text>

  <!-- Arrow 1→2 -->
  <line x1="340" y1="165" x2="340" y2="208" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="191" font-size="11" fill="#888780">Sensor data</text>

  <!-- NODE 2: Raspberry Pi (purple) -->
  <rect x="175" y="208" width="330" height="80" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="340" y="234" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">Central processing unit</text>
  <text x="340" y="254" text-anchor="middle" font-size="12" fill="#534AB7">Raspberry Pi 4/5 · Python · Flask · SQLite3</text>
  <text x="340" y="272" text-anchor="middle" font-size="12" fill="#534AB7">4-level alert algorithm with hysteresis</text>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="288" x2="340" y2="331" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="314" font-size="11" fill="#888780">Control command</text>

  <!-- NODE 3: Command Interface (amber) -->
  <rect x="215" y="331" width="250" height="70" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="340" y="359" text-anchor="middle" font-size="14" font-weight="600" fill="#633806">Command interface</text>
  <text x="340" y="380" text-anchor="middle" font-size="12" fill="#854F0B">VFD · GPIO relay · Modbus RTU</text>

  <!-- Arrow 3→4 -->
  <line x1="340" y1="401" x2="340" y2="444" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="427" font-size="11" fill="#888780">Fan speed signal</text>

  <!-- NODE 4: Hybrid Filtration (coral) -->
  <rect x="175" y="444" width="330" height="80" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="340" y="470" text-anchor="middle" font-size="14" font-weight="600" fill="#712B13">Hybrid filtration &amp; ventilation</text>
  <text x="340" y="490" text-anchor="middle" font-size="12" fill="#993C1D">60 × HEPA H13 + activated carbon modules</text>
  <text x="340" y="508" text-anchor="middle" font-size="12" fill="#993C1D">2,500 m³/h each · 150,000 m³/h total</text>

  <!-- Feedback arrow (dashed, right side) -->
  <path d="M505 484 L575 484 L575 130 L465 130" fill="none" stroke="#888780" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#arrow-dashed)"/>
  <text x="590" y="340" text-anchor="middle" font-size="11" fill="#888780" transform="rotate(90,590,340)">Air quality feedback</text>

  <!-- Legend box -->
  <rect x="46" y="375" width="144" height="155" rx="10" fill="#f1efe8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="118" y="398" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Alert levels</text>
  <!-- Standby -->
  <rect x="58" y="411" width="12" height="12" rx="3" fill="#1D9E75"/>
  <text x="78" y="421" font-size="11" fill="#444441">Standby — 10%</text>
  <!-- Moderate -->
  <rect x="58" y="433" width="12" height="12" rx="3" fill="#BA7517"/>
  <text x="78" y="443" font-size="11" fill="#444441">Moderate — 40%</text>
  <!-- High -->
  <rect x="58" y="455" width="12" height="12" rx="3" fill="#D85A30"/>
  <text x="78" y="465" font-size="11" fill="#444441">High — 75%</text>
  <!-- Critical -->
  <rect x="58" y="477" width="12" height="12" rx="3" fill="#A32D2D"/>
  <text x="78" y="487" font-size="11" fill="#444441">Critical — 100%</text>
  <text x="118" y="512" text-anchor="middle" font-size="11" fill="#5F5E5A">PM2.5 · CO · NO₂</text>

  <!-- Footer credit -->
  <text x="340" y="600" text-anchor="middle" font-size="10" fill="#B4B2A9">Bachelor's Thesis · Politehnica București · Andrei Blebea · 2025</text>
</svg>
