<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img">
  <title>CAPEX Breakdown — Obor Underpass Ventilation System</title>
  <desc>Pie chart showing capital expenditure breakdown: filtration modules 68.4%, monitoring stations 6.8%, civil works 9.5%, installation 8.6%, engineering 5.7%, control unit 1.0%. Total 52,600 EUR.</desc>

  <rect width="680" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#2C2C2A">CAPEX breakdown — Obor underpass pilot</text>
  <text x="340" y="48" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">Total estimated investment: 52,600 € · Source: Tabel 5, Capitolul 5</text>

  <!-- SEG 1: Filtration modules 68.44% — coral -->
  <path d="M230,280 L230,100 A180,180 0 1,1 65.0,351.5 Z"
        fill="#F5C4B3" stroke="#ffffff" stroke-width="2"/>

  <!-- SEG 2: Monitoring stations 6.84% — teal -->
  <path d="M230,280 L65.0,351.5 A180,180 0 0,1 50.0,276.9 Z"
        fill="#5DCAA5" stroke="#ffffff" stroke-width="2"/>

  <!-- SEG 3: Technical construction 9.51% — amber -->
  <path d="M230,280 L50.0,276.9 A180,180 0 0,1 82.7,176.5 Z"
        fill="#FAC775" stroke="#ffffff" stroke-width="2"/>

  <!-- SEG 4: Installation + electrical 8.56% — purple -->
  <path d="M230,280 L82.7,176.5 A180,180 0 0,1 156.8,115.6 Z"
        fill="#AFA9EC" stroke="#ffffff" stroke-width="2"/>

  <!-- SEG 5: Engineering + PM 5.70% — gray -->
  <path d="M230,280 L156.8,115.6 A180,180 0 0,1 219.0,100.3 Z"
        fill="#B4B2A9" stroke="#ffffff" stroke-width="2"/>

  <!-- SEG 6: Control system 0.95% — dark teal -->
  <path d="M230,280 L219.0,100.3 A180,180 0 0,1 230,100 Z"
        fill="#085041" stroke="#ffffff" stroke-width="2"/>

  <!-- Centre donut hole -->
  <circle cx="230" cy="280" r="72" fill="#ffffff"/>
  <text x="230" y="272" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#2C2C2A">52,600 €</text>
  <text x="230" y="292" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">Total CAPEX</text>

  <!-- Callout lines + labels -->
  <!-- Seg 1: filtration -->
  <line x1="322" y1="356" x2="430" y2="390" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="435" y="386" font-size="11" fill="#712B13">Filtration modules</text>
  <text x="435" y="401" font-size="11" fill="#993C1D">36,000 € · 68.4%</text>

  <!-- Seg 2: monitoring -->
  <line x1="93" y1="324" x2="30" y2="370" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="28" y="367" text-anchor="end" font-size="11" fill="#085041">Monitoring</text>
  <text x="28" y="382" text-anchor="end" font-size="11" fill="#0F6E56">3,600 € · 6.8%</text>

  <!-- Seg 3: civil works -->
  <line x1="82" y1="234" x2="30" y2="230" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="28" y="218" text-anchor="end" font-size="11" fill="#633806">Civil works</text>
  <text x="28" y="233" text-anchor="end" font-size="11" fill="#854F0B">5,000 € · 9.5%</text>

  <!-- Seg 4: installation -->
  <line x1="137" y1="162" x2="90" y2="128" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="88" y="116" text-anchor="end" font-size="11" fill="#3C3489">Installation</text>
  <text x="88" y="131" text-anchor="end" font-size="11" fill="#534AB7">4,500 € · 8.6%</text>

  <!-- Seg 5: engineering -->
  <line x1="196" y1="118" x2="210" y2="76" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="212" y="64" text-anchor="middle" font-size="11" fill="#444441">Engineering</text>
  <text x="212" y="79" text-anchor="middle" font-size="11" fill="#5F5E5A">3,000 € · 5.7%</text>

  <!-- Seg 6: control unit -->
  <line x1="226" y1="100" x2="270" y2="68" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="275" y="56" font-size="11" fill="#085041">Control unit</text>
  <text x="275" y="71" font-size="11" fill="#0F6E56">500 € · 1.0%</text>

  <!-- LEGEND -->
  <rect x="430" y="80" width="224" height="222" rx="12" fill="#F8F8F6" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="542" y="102" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#2C2C2A">Cost categories</text>

  <rect x="448" y="120" width="14" height="14" rx="3" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
  <text x="468" y="127" dominant-baseline="central" font-size="12" fill="#2C2C2A">Filtration modules</text>
  <text x="468" y="141" dominant-baseline="central" font-size="11" fill="#993C1D">36,000 € (68.4%)</text>

  <rect x="448" y="158" width="14" height="14" rx="3" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="468" y="165" dominant-baseline="central" font-size="12" fill="#2C2C2A">Monitoring stations</text>
  <text x="468" y="179" dominant-baseline="central" font-size="11" fill="#0F6E56">3,600 € (6.8%)</text>

  <rect x="448" y="196" width="14" height="14" rx="3" fill="#FAC775" stroke="#854F0B" stroke-width="0.8"/>
  <text x="468" y="203" dominant-baseline="central" font-size="12" fill="#2C2C2A">Civil / technical works</text>
  <text x="468" y="217" dominant-baseline="central" font-size="11" fill="#854F0B">5,000 € (9.5%)</text>

  <rect x="448" y="234" width="14" height="14" rx="3" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.8"/>
  <text x="468" y="241" dominant-baseline="central" font-size="12" fill="#2C2C2A">Installation &amp; wiring</text>
  <text x="468" y="255" dominant-baseline="central" font-size="11" fill="#534AB7">4,500 € (8.6%)</text>

  <rect x="448" y="272" width="14" height="14" rx="3" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="468" y="279" dominant-baseline="central" font-size="12" fill="#2C2C2A">Engineering &amp; PM</text>
  <text x="468" y="293" dominant-baseline="central" font-size="11" fill="#5F5E5A">3,000 € (5.7%)</text>

  <rect x="448" y="275" width="0" height="0"/>
  <!-- small control unit row -->
  <rect x="448" y="305" width="14" height="14" rx="3" fill="#085041" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="468" y="312" dominant-baseline="central" font-size="12" fill="#2C2C2A">Control unit (Pi + relay)</text>
  <text x="468" y="326" dominant-baseline="central" font-size="11" fill="#085041">500 € (1.0%)</text>

  <!-- Key insight box -->
  <rect x="430" y="322" width="224" height="58" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="542" y="340" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#633806">Key insight</text>
  <text x="542" y="357" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#633806">Control system = only 1% of total</text>
  <text x="542" y="372" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#633806">investment — high ROI on intelligence</text>

  <!-- Footer -->
  <text x="340" y="508" text-anchor="middle" font-size="10" fill="#B4B2A9">Bachelor's Thesis · Politehnica București · Andrei Blebea · 2025 · Tabel 5, Cap. 5</text>
</svg>
