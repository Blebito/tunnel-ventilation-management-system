<svg width="680" height="980" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img">
  <title>Control Algorithm Flowchart — Tunnel Ventilation System</title>
  <desc>Sequential decision flowchart: read sensors every 10s, check Critical threshold first, then High, then Moderate, else Standby. Loop with hysteresis.</desc>

  <rect width="680" height="980" fill="#ffffff"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- START -->
  <ellipse cx="340" cy="54" rx="72" ry="26" fill="#D3D1C7" stroke="#888780" stroke-width="1"/>
  <text x="340" y="54" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#2C2C2A">Start</text>

  <line x1="340" y1="80" x2="340" y2="112" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- READ SENSORS -->
  <rect x="210" y="112" width="260" height="58" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="340" y="134" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#085041">Read sensor data</text>
  <text x="340" y="154" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">PM2.5 · CO · NO₂  — every 10 s</text>

  <line x1="340" y1="170" x2="340" y2="210" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DIAMOND: CRITICAL? -->
  <polygon points="340,210 460,252 340,294 220,252" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <text x="340" y="246" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#501313">Critical?</text>
  <text x="340" y="264" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#A32D2D">PM2.5 &gt;75 · CO &gt;90 · NO₂ &gt;200</text>

  <!-- YES → CRITICAL ACTION -->
  <line x1="460" y1="252" x2="530" y2="252" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="494" y="244" text-anchor="middle" font-size="11" fill="#888780">YES</text>
  <rect x="530" y="222" width="118" height="60" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <text x="589" y="244" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#501313">Fans 100%</text>
  <text x="589" y="263" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#A32D2D">+ emergency alert</text>

  <!-- NO → HIGH -->
  <line x1="340" y1="294" x2="340" y2="334" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="318" font-size="11" fill="#888780" dominant-baseline="central">NO</text>

  <!-- DIAMOND: HIGH? -->
  <polygon points="340,334 460,376 340,418 220,376" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="340" y="370" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#4A1B0C">High?</text>
  <text x="340" y="388" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#993C1D">PM2.5 &gt;35 · CO &gt;30 · NO₂ &gt;100</text>

  <!-- YES → HIGH ACTION -->
  <line x1="460" y1="376" x2="530" y2="376" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="494" y="368" text-anchor="middle" font-size="11" fill="#888780">YES</text>
  <rect x="530" y="352" width="118" height="48" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="589" y="380" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#4A1B0C">Fans 75%</text>

  <!-- NO → MODERATE -->
  <line x1="340" y1="418" x2="340" y2="458" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="442" font-size="11" fill="#888780" dominant-baseline="central">NO</text>

  <!-- DIAMOND: MODERATE? -->
  <polygon points="340,458 460,500 340,542 220,500" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="340" y="494" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#412402">Moderate?</text>
  <text x="340" y="512" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">PM2.5 &gt;15 · CO &gt;10</text>

  <!-- YES → MODERATE ACTION -->
  <line x1="460" y1="500" x2="530" y2="500" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="494" y="492" text-anchor="middle" font-size="11" fill="#888780">YES</text>
  <rect x="530" y="476" width="118" height="48" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="589" y="504" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#412402">Fans 40%</text>

  <!-- NO → STANDBY -->
  <line x1="340" y1="542" x2="340" y2="582" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="566" font-size="11" fill="#888780" dominant-baseline="central">NO</text>

  <!-- STANDBY -->
  <rect x="210" y="582" width="260" height="48" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="340" y="610" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#085041">Fans 10% — standby</text>

  <!-- Standby → Hysteresis -->
  <line x1="340" y1="630" x2="340" y2="672" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Convergence from right-side actions -->
  <path d="M589 282 L589 656 L340 656" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M589 400 L589 656" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>
  <path d="M589 524 L589 656" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>

  <!-- HYSTERESIS WAIT -->
  <rect x="185" y="672" width="310" height="62" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="340" y="696" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#3C3489">Wait 10 s · apply hysteresis</text>
  <text x="340" y="716" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Return to lower level only if well below threshold</text>

  <!-- Loop back arrow -->
  <path d="M340 734 L340 760 L140 760 L140 141 L210 141" fill="none" stroke="#888780" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="116" y="452" text-anchor="middle" font-size="11" fill="#888780" transform="rotate(-90,116,452)">↻  continuous loop</text>

  <!-- THRESHOLD LEGEND -->
  <rect x="46" y="812" width="588" height="140" rx="12" fill="#F8F8F6" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="340" y="836" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#2C2C2A">WHO-based alert thresholds</text>

  <text x="120" y="858" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Level</text>
  <text x="280" y="858" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">PM2.5 (µg/m³)</text>
  <text x="420" y="858" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">CO (ppm)</text>
  <text x="560" y="858" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">NO₂ (µg/m³)</text>
  <line x1="56" y1="866" x2="624" y2="866" stroke="#B4B2A9" stroke-width="0.5"/>

  <rect x="58" y="872" width="12" height="12" rx="3" fill="#BA7517"/>
  <text x="120" y="880" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">Moderate (L1)</text>
  <text x="280" y="880" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">&gt; 15</text>
  <text x="420" y="880" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">&gt; 10</text>
  <text x="560" y="880" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">—</text>

  <rect x="58" y="898" width="12" height="12" rx="3" fill="#D85A30"/>
  <text x="120" y="906" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">High (L2)</text>
  <text x="280" y="906" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">&gt; 35</text>
  <text x="420" y="906" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">&gt; 30</text>
  <text x="560" y="906" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">&gt; 100</text>

  <rect x="58" y="924" width="12" height="12" rx="3" fill="#A32D2D"/>
  <text x="120" y="932" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">Critical (L3)</text>
  <text x="280" y="932" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">&gt; 75</text>
  <text x="420" y="932" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">&gt; 90</text>
  <text x="560" y="932" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">&gt; 200</text>

  <text x="340" y="966" text-anchor="middle" font-size="10" fill="#B4B2A9">Bachelor's Thesis · Politehnica București · Andrei Blebea · 2025</text>
</svg>
